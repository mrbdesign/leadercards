<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MUKIMU Leader Cards">
  <title>Leadercards</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: #344af1;
      color: #fff;
      overflow-x: auto;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      color: #fff;
    }

    .header-note {
      margin: 0 0 16px;
      color: #fff;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .toolbar button {
      border: 1px solid #ccc;
      background: white;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    .toolbar button.active {
      background: #111;
      color: white;
      border-color: #111;
    }

    .grid {
      display: flex;
      flex-wrap: nowrap;
      gap: 20px;
      width: max-content;
      margin: 0 auto;
    }

    .card {
      flex: 0 0 300px;
      width: 300px;
      height: 400px;
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      cursor: pointer;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }
  </style>
</head>
<body>
  <h1>MUKIMU Leader Cards</h1>
  <p class="header-note">Are You Feeling Lucky ?</p>

  <div class="toolbar">
    <button class="active" data-filter="all">All</button>
    <button data-filter="alpha">1</button>
    <button data-filter="beta">2</button>
    <button data-filter="gamma">3</button>
  </div>

  <div class="grid" id="grid">
    <div class="card alpha">
      <img src="images/cover-1.png" alt="Card 1">
    </div>

    <div class="card beta">
      <img src="images/cover-2.png" alt="Card 2">
    </div>

    <div class="card gamma">
      <img src="images/cover-3.png" alt="Card 3">
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const buttons = document.querySelectorAll('.toolbar button');
      const cards = document.querySelectorAll('.card');

      const soundSources = {
        win1: 'sounds/win1.wav',
        win2: 'sounds/win2.wav',
        win5: 'sounds/win5.wav',
        lose1: 'sounds/lose1.wav',
        lose2: 'sounds/lose2.wav',
        lose5: 'sounds/lose5.wav'
      };

      const audioPlayer = document.createElement('audio');
      audioPlayer.preload = 'auto';
      audioPlayer.setAttribute('playsinline', '');
      audioPlayer.style.display = 'none';
      document.body.appendChild(audioPlayer);

      audioPlayer.addEventListener('canplaythrough', () => {
        console.log('Audio ready to play:', audioPlayer.currentSrc || audioPlayer.src);
      });

      audioPlayer.addEventListener('error', () => {
        console.error('Audio load/play error', audioPlayer.currentSrc || audioPlayer.src, audioPlayer.error);
      });

      const soundMap = {
        1: 'win1', 2: 'win1', 3: 'win1', 4: 'win1', 5: 'win1',
        6: 'win1', 7: 'win1', 8: 'win1', 9: 'win1', 10: 'win1',
        11: 'win1', 12: 'win2', 13: 'win1', 14: 'win1', 15: 'win1',
        16: 'lose5', 17: 'win2', 18: 'win2', 19: 'win2', 20: 'win2',
        21: 'win2', 22: 'win2', 23: 'win2', 24: 'win2', 25: 'win2',
        26: 'win2', 27: 'win2', 28: 'win2', 29: 'win2', 30: 'lose1',
        31: 'lose1', 32: 'lose1', 33: 'lose1', 34: 'win2', 35: 'win1',
        36: 'win1', 37: 'win1', 38: 'win1', 39: 'win1', 40: 'win1',
        41: 'win1', 42: 'win1', 43: 'win1', 44: 'win1', 45: 'win1',
        46: 'win1', 47: 'lose2', 48: 'lose2', 49: 'lose5', 50: 'win5'
      };

      function playSoundByKey(key) {
        const src = soundSources[key];
        if (!src) {
          console.warn('Missing sound key:', key);
          return;
        }

        audioPlayer.src = src;
        audioPlayer.currentTime = 0;

        const playPromise = audioPlayer.play();
        if (playPromise && typeof playPromise.then === 'function') {
          playPromise
            .then(() => {
              console.log('Playing sound:', key, audioPlayer.currentSrc || audioPlayer.src);
            })
            .catch(err => {
              console.error('Audio play failed:', key, err && err.name, err && err.message);
            });
        } else {
          console.warn('Unable to play audio object for key:', key);
        }
      }

      function getRandomRevealNumber() {
        return Math.floor(Math.random() * 50) + 1;
      }

      cards.forEach(card => {
        card.addEventListener('click', event => {
          event.preventDefault();

          const img = card.querySelector('img');
          const revealNumber = getRandomRevealNumber();
          const soundKey = soundMap[revealNumber];

          console.log('Card clicked. Reveal number:', revealNumber, 'Sound key:', soundKey);
          img.src = `images/${revealNumber}.png`;
          playSoundByKey(soundKey);
        });
      });

      buttons.forEach(button => {
        button.addEventListener('click', () => {
          buttons.forEach(b => b.classList.remove('active'));
          button.classList.add('active');

          const filter = button.dataset.filter;
          cards.forEach(card => {
            card.style.display = (filter === 'all' || card.classList.contains(filter)) ? 'block' : 'none';
          });
        });
      });
    });
  </script>
</body>
</html>
