<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MUKIMU Leader Cards">
  <title>Leadercards</title>
  <style>
    * {
      box-sizing: border-box;
    }

body {
  margin: 0;
  padding: 24px;
  font-family: Arial, sans-serif;
  background: #344af1;
  color: #fff;
  overflow-x: auto;
}

h1 {
  margin: 0 0 8px;
  font-size: 28px;
  color: #fff;
}

.header-note {
  margin: 0 0 16px;
  color: #fff;
}


    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .toolbar button {
      border: 1px solid #ccc;
      background: white;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    .toolbar button.active {
      background: #111;
      color: white;
      border-color: #111;
    }

    .grid {
      display: flex;
      flex-wrap: nowrap;
      gap: 20px;
      width: max-content;
      margin: 0 auto;
    }

    .card {
      flex: 0 0 300px;
      width: 300px;
      height: 400px;
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      cursor: pointer;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }
  </style>
</head>
<body>
  <h1>MUKIMU Leader Cards</h1>
  <p class="header-note">Are You Feeling Lucky ?</p>

  <div class="toolbar">
    <button class="active" data-filter="all">All</button>
    <button data-filter="alpha">1</button>
    <button data-filter="beta">2</button>
    <button data-filter="gamma">3</button>
  </div>

  <div class="grid" id="grid">
    <div class="card alpha">
      <img src="images/cover-1.png" alt="Card 1">
    </div>

    <div class="card beta">
      <img src="images/cover-2.png" alt="Card 2">
    </div>

    <div class="card gamma">
      <img src="images/cover-3.png" alt="Card 3">
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const buttons = document.querySelectorAll('.toolbar button');
      const cards = document.querySelectorAll('.card');

      buttons.forEach(button => {
        button.addEventListener('click', () => {
          buttons.forEach(b => b.classList.remove('active'));
          button.classList.add('active');

          const filter = button.dataset.filter;
          cards.forEach(card => {
            card.style.display = (filter === 'all' || card.classList.contains(filter)) ? 'block' : 'none';
          });
        });
      });

      function getRandomReveal() {
        const n = Math.floor(Math.random() * 50) + 1;
        return `images/${n}.png`;
      }

      cards.forEach(card => {
        card.addEventListener('click', () => {
          const img = card.querySelector('img');
          img.src = getRandomReveal();
        });
      });
    });
  </script>
</body>
</html>
